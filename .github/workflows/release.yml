name: Release

# How to cut a release:
#   1. git tag v1.1.1
#   2. git push origin v1.1.1
# A new GitHub Release is created automatically with the .exe artifacts
# attached (Shade.exe portable + ShadeSetup.exe installer).
#
# You can also trigger a build manually from the Actions tab — those runs
# don't create a release, just upload the artifacts so you can grab them
# from the run page.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # needed to create releases

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out shade-win
        uses: actions/checkout@v4

      - name: Check out g3ntrix/Shade upstream (for the Python core sources)
        uses: actions/checkout@v4
        with:
          repository: g3ntrix/Shade
          path: shade-upstream

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # The prebuilt PyInstaller bootloader on PyPI is fingerprinted by
      # most antivirus vendors (malware authors heavily abuse PyInstaller),
      # so any .exe produced with it gets flagged on user machines.
      # Compiling the bootloader from source on the runner produces a
      # unique binary hash that hasn't been signatured. This is the single
      # highest-impact step for reducing Windows Defender false positives
      # without buying a code-signing certificate.
      - name: Build PyInstaller from source (fresh bootloader → fewer AV flags)
        shell: pwsh
        run: |
          git clone --depth 1 --branch v6.11.1 https://github.com/pyinstaller/pyinstaller.git pyinstaller-src
          Push-Location pyinstaller-src/bootloader
          python ./waf all
          Pop-Location
          python -m pip install ./pyinstaller-src
          python -c "import PyInstaller; print('PyInstaller', PyInstaller.__version__, 'installed from source')"

      - name: Build shade-core.exe (PyInstaller)
        shell: pwsh
        run: ./scripts/build-core.ps1 -UpstreamRoot "${{ github.workspace }}/shade-upstream"

      - name: Build Shade.exe (dotnet publish, self-contained single-file)
        shell: pwsh
        run: ./scripts/build-app.ps1

      - name: Stage license + icon next to the installer script
        shell: pwsh
        run: |
          if (Test-Path shade-upstream/LICENSE) {
            Copy-Item shade-upstream/LICENSE installer/LICENSE.txt
          }
          # Inno Setup copies these from the working dir; staging here keeps
          # paths in Shade.iss simple.

      - name: Build ShadeSetup.exe (Inno Setup)
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            choco install innosetup --yes --no-progress
          }
          & $iscc installer/Shade.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed: $LASTEXITCODE" }

      - name: Stage release artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          if (Test-Path publish/Shade.exe)              { Copy-Item publish/Shade.exe              artifacts/Shade.exe }
          if (Test-Path publish/shade-core.exe)         { Copy-Item publish/shade-core.exe         artifacts/shade-core.exe }
          if (Test-Path installer/Output/ShadeSetup.exe){ Copy-Item installer/Output/ShadeSetup.exe artifacts/ShadeSetup.exe }
          Get-ChildItem artifacts | Format-Table -AutoSize

      # On tag pushes: create a GitHub Release with the .exe files attached.
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/Shade.exe
            artifacts/ShadeSetup.exe
            artifacts/shade-core.exe
          generate_release_notes: true
          fail_on_unmatched_files: false
          body: |
            ## Shade for Windows ${{ github.ref_name }}

            **Two ways to install:**

            - **`ShadeSetup.exe`** — installer (recommended). Adds Start menu / desktop shortcuts, optional auto-start.
            - **`Shade.exe`** — portable single-file build. Just download and run; no install needed.

            **`shade-core.exe`** is the Python relay binary. The installer and the app already bundle it; only download it directly if you need the standalone CLI.

            See the [README](https://github.com/${{ github.repository }}#readme) for build / setup instructions.

      # On manual / non-tag runs: just upload the artifacts so they can be
      # grabbed from the workflow run page.
      - name: Upload build artifacts (non-release runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: shade-windows
          path: artifacts/
